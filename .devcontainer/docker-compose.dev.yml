services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-nestjs-app
    volumes:
      - ..:/workspaces/app:cached
      - /workspaces/app/node_modules
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    container_name: app-db-pg
    restart: unless-stopped
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'postgres']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge
